name: closi_app
description: Closi - Negocios y servicios cercanos
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  path_provider: ^2.1.5
  shared_preferences: ^2.3.0
  sqflite: ^2.4.1
  path: ^1.9.0
  uuid: ^4.4.0
  connectivity_plus: ^6.0.5
  image_picker: ^1.2.3
  geolocator: ^14.0.3
  url_launcher: ^6.3.0
  font_awesome_flutter: ^11.0.0
  bcrypt: ^1.2.0
  http: ^1.2.0
  postgres: ^3.5.12
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/only_logo_blue.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/only_logo_blue.png"
  remove_alpha_ios: true

flutter_native_splash:
  image: "assets/images/logo_name_down_blue.png"
  color: "#FFFFFF"
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: center
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/maps/
    - assets/images/
